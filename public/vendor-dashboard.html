<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Vendor Dashboard</title>

<!-- BOOTSTRAP -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* GLOBAL */
body{
  background: linear-gradient(135deg,#eef2f7,#dfe9f3);
  font-family: 'Segoe UI', sans-serif;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  height:100vh;
  position:fixed;
  top:0;
  left:-260px;
  background:#1f2d3d;
  color:white;
  padding:20px;
  transition:0.3s;
  z-index:1000;
}

.sidebar.active{
  left:0;
}

.sidebar h3{
  margin-bottom:20px;
}

.sidebar button{
  width:100%;
  margin-bottom:12px;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#2f4055;
  color:white;
  transition:0.2s;
}

.sidebar button:hover{
  background:#1abc9c;
}

/* OVERLAY */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  display:none;
  z-index:999;
}

.overlay.active{
  display:block;
}

/* MAIN */
.main{
  padding:20px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

/* CARD */
.card-box{
  background:white;
  border-radius:12px;
  padding:20px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
  margin-bottom:20px;
}

/* TABLE */
.table thead{
  background:#1f2d3d;
  color:white;
}

.table tbody tr:hover{
  background:#f1f5f9;
}

/* BUTTON */
.btn-main{
  background:#1abc9c;
  color:white;
  border:none;
}

.btn-main:hover{
  background:#16a085;
}

</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h3>Vendor</h3>
  <button onclick="loadPage('orders')">Orders</button>
  <button onclick="loadPage('apartments')">Apartments</button>
  <button onclick="loadPage('blocks')">Blocks</button>
  <button onclick="loadPage('settings')">Settings</button>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<!-- MAIN -->
<div class="main container-fluid">

<div class="header">
  <button class="btn btn-dark" onclick="toggleMenu()">☰</button>
  <h4 id="vendorName">Welcome</h4>
  <button class="btn btn-main" onclick="generateOrders()">Generate</button>
</div>

<div id="content"></div>

</div>

<script>

const token = new URLSearchParams(window.location.search).get("token")

/* MENU */
function toggleMenu(){
 document.getElementById("sidebar").classList.toggle("active")
 document.getElementById("overlay").classList.toggle("active")
}

/* ROUTER */
function loadPage(p){
 if(p==="orders") loadOrders()
 if(p==="apartments") loadApartments()
 if(p==="blocks") loadBlocks()
 if(p==="settings") loadSettings()
 toggleMenu()
}

/* ORDERS */
function loadOrders(){
 fetch(`/vendor/orders?token=${token}`)
 .then(r=>r.json())
 .then(d=>{

 vendorName.innerText="Welcome "+d.vendorName

 let html=`
 <div class="card-box">
   <h5>Total Tomorrow: ${d.totalPackets}</h5>
 </div>

 <div class="card-box">
 <table class="table">
 <thead>
 <tr><th>Phone</th><th>Address</th><th>Qty</th><th>Date</th></tr>
 </thead><tbody>`

 d.orders.forEach(o=>{
  html+=`
  <tr>
  <td>${o.phone}</td>
  <td>${o.address||""}</td>
  <td>${o.quantity}</td>
  <td>${new Date(o.order_date).toLocaleDateString()}</td>
  </tr>`
 })

 html+="</tbody></table></div>"
 content.innerHTML=html
 })
}

/* APARTMENTS */
function loadApartments(){
 fetch(`/vendor/apartments?token=${token}`)
 .then(r=>r.json())
 .then(data=>{

 let html=`
 <div class="card-box">
 <h5>Add Apartment</h5>
 <div class="row g-2">
 <div class="col"><input id="aptName" class="form-control" placeholder="Name"></div>
 <div class="col"><input id="aptAddress" class="form-control" placeholder="Address"></div>
 <div class="col-auto"><button class="btn btn-main" onclick="addApartment()">Add</button></div>
 </div>
 </div>

 <div class="card-box">
 <table class="table">
 <thead><tr><th>Name</th><th>Address</th><th>Status</th><th>Action</th></tr></thead><tbody>
 `

 data.forEach(a=>{
 html+=`
 <tr>
 <td>${a.name}</td>
 <td>${a.address}</td>
 <td><span class="badge ${a.is_active?'bg-success':'bg-danger'}">${a.is_active?'Active':'Inactive'}</span></td>
 <td>
 <button class="btn btn-sm btn-warning" onclick="toggleApartment(${a.apartment_id})">Toggle</button>
 <button class="btn btn-sm btn-danger" onclick="deleteApartment(${a.apartment_id})">Delete</button>
 </td>
 </tr>`
 })

 html+="</tbody></table></div>"
 content.innerHTML=html
 })
}

/* BLOCKS */
function loadBlocks(){
 fetch(`/vendor/apartments?token=${token}`)
 .then(r=>r.json())
 .then(apts=>{

 let html=`
 <div class="card-box">
 <h5>Blocks</h5>

 <div class="row g-2">
 <div class="col">
 <select id="blockApt" class="form-select" onchange="loadBlockList(this.value)">
 <option value="">Select Apartment</option>`

 apts.forEach(a=>{
 html+=`<option value="${a.apartment_id}">${a.name}</option>`
 })

 html+=`</select></div>

 <div class="col"><input id="blockName" class="form-control" placeholder="Block Name"></div>
 <div class="col-auto"><button class="btn btn-main" onclick="addBlock()">Add</button></div>
 </div>

 <div id="blockList" class="mt-3"></div>
 </div>`

 content.innerHTML=html
 })
}

function loadBlockList(id){
 if(!id) return

 fetch(`/vendor/blocks/${id}?token=${token}`)
 .then(r=>r.json())
 .then(data=>{
 let html=`<table class="table">
 <thead><tr><th>Block</th><th>Status</th><th>Action</th></tr></thead><tbody>`

 data.forEach(b=>{
 html+=`
 <tr>
 <td>${b.block_name}</td>
 <td><span class="badge ${b.is_active?'bg-success':'bg-danger'}">${b.is_active?'Active':'Inactive'}</span></td>
 <td>
 <button class="btn btn-sm btn-warning" onclick="toggleBlock(${b.block_id})">Toggle</button>
 <button class="btn btn-sm btn-danger" onclick="deleteBlock(${b.block_id})">Delete</button>
 </td>
 </tr>`
 })

 html+="</tbody></table>"
 blockList.innerHTML=html
 })
}

/* SETTINGS */
function loadSettings(){
 fetch(`/vendor/settings?token=${token}`)
 .then(r=>r.json())
 .then(s=>{
 content.innerHTML=`
 <div class="card-box">
 <h5>Settings</h5>

 <div class="form-check">
 <input class="form-check-input" type="checkbox" id="apt" ${s.allow_apartments?"checked":""}>
 <label class="form-check-label">Apartments</label>
 </div>

 <div class="form-check">
 <input class="form-check-input" type="checkbox" id="house" ${s.allow_houses?"checked":""}>
 <label class="form-check-label">Houses</label>
 </div>

 <div class="form-check">
 <input class="form-check-input" type="checkbox" id="active" ${s.is_active?"checked":""}>
 <label class="form-check-label">Active</label>
 </div>

 <button class="btn btn-main mt-3" onclick="saveSettings()">Save</button>
 </div>`
 })
}

/* COMMON */
function addApartment(){/* same as before */}
function toggleApartment(id){fetch(`/vendor/apartments/${id}/toggle?token=${token}`,{method:"PATCH"}).then(loadApartments)}
function deleteApartment(id){fetch(`/vendor/apartments/${id}?token=${token}`,{method:"DELETE"}).then(loadApartments)}
function addBlock(){fetch(`/vendor/blocks?token=${token}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({apartment_id:blockApt.value,block_name:blockName.value})}).then(()=>loadBlockList(blockApt.value))}
function toggleBlock(id){fetch(`/vendor/blocks/${id}/toggle?token=${token}`,{method:"PATCH"}).then(()=>loadBlockList(blockApt.value))}
function deleteBlock(id){fetch(`/vendor/blocks/${id}?token=${token}`,{method:"DELETE"}).then(()=>loadBlockList(blockApt.value))}
function saveSettings(){fetch(`/vendor/settings?token=${token}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({allow_apartments:apt.checked,allow_houses:house.checked,is_active:active.checked})}).then(()=>alert("Saved"))}
function generateOrders(){fetch(`/vendor/generate-orders?token=${token}`,{method:"POST"}).then(loadOrders)}

loadPage("orders")

</script>

</body>
</html>
