<!DOCTYPE html>
<html>
<head>
<title>Vendor Dashboard</title>
</head>

<body>

<h1>Milk Vendor Dashboard</h1>

<h2 id="total"></h2>

<button onclick="generateOrders()">Generate Orders</button>

<br><br>

<table border="1">

<thead>
<tr>
<th>Customer Phone</th>
<th>Address</th>
<th>Packets</th>
<th>Date</th>
</tr>
</thead>

<tbody id="orders"></tbody>

</table>

<script>

const token = new URLSearchParams(window.location.search).get("token")

function loadOrders(){

 fetch(`/vendor/orders?token=${token}`)
 .then(res=>res.json())
 .then(data=>{

 document.getElementById("total").innerText =
 "Tomorrow Total Packets: "+data.totalPackets

 const table=document.getElementById("orders")

 table.innerHTML=""  // clear table

 data.orders.forEach(o=>{

 table.innerHTML += `
 <tr>
 <td>${o.phone}</td>
 <td>${o.address || "N/A"}</td>
 <td>${o.quantity}</td>
 <td>${o.order_date}</td>
 </tr>
 `

 })

 })

}

/* ---------------- GENERATE ORDERS ---------------- */

function generateOrders(){

 fetch(`/vendor/generate-orders?token=${token}`,{
  method:"POST"
 })
 .then(res=>res.json())
 .then(data=>{

 alert(data.message)

 loadOrders()  // reload table

 })

}

/* Initial load */
loadOrders()

</script>

</body>
</html>
