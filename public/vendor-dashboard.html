<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vendor Dashboard</title>

<style>

body{
  font-family: Arial;
  background:#f5f6fa;
  margin:0;
}

.container{padding:10px;}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.vendor-name{font-size:20px;font-weight:bold;}

.btn{
  background:#2ecc71;
  color:white;
  padding:10px;
  border:none;
  border-radius:6px;
}

.card{
  background:white;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
}

/* FILTERS */
.filters{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.filters input, .filters select{
  padding:8px;
  flex:1;
}

/* TABLE */
.table-view{display:block;}

table{width:100%;border-collapse:collapse;}

th{
  background:#2c3e50;
  color:white;
  padding:8px;
}

td{padding:8px;border-bottom:1px solid #ddd;}

.order-card{display:none;}

.card-row{
  background:white;
  padding:10px;
  margin-bottom:8px;
}

/* MOBILE */
@media(max-width:768px){
.table-view{display:none;}
.order-card{display:block;}
}

</style>

</head>

<body>

<div class="container">

<div class="header">
 <div class="vendor-name" id="vendorName">Vendor</div>
 <button class="btn" onclick="generateOrders()">Generate</button>
</div>

<div class="card">
 <h3 id="total"></h3>
</div>

<div class="card filters">
 <input id="phoneSearch" placeholder="Phone" oninput="filterData()">
 <input id="addressSearch" placeholder="Address" oninput="filterData()">
 <select id="apartmentFilter" onchange="filterData()">
  <option value="">All Apartments</option>
 </select>
</div>

<div class="card table-view">
<table>
<thead>
<tr>
<th>Phone</th>
<th>Address</th>
<th onclick="sortTable('quantity')">Packets</th>
<th onclick="sortTable('date')">Date</th>
</tr>
</thead>
<tbody id="orders"></tbody>
</table>
</div>

<div id="mobileOrders" class="order-card"></div>

</div>

<script>

const token = new URLSearchParams(window.location.search).get("token")

let allData=[]
let filteredData=[]

function loadOrders(){

 fetch(`/vendor/orders?token=${token}`)
 .then(res=>res.json())
 .then(data=>{

 document.getElementById("total").innerText =
 "Tomorrow Total: " + data.totalPackets

 document.getElementById("vendorName").innerText =
 "Welcome " + data.vendorName

 allData = data.orders
 filteredData = [...allData]

 loadApartmentFilter()
 render()

 })

}

function loadApartmentFilter(){

 const select=document.getElementById("apartmentFilter")
 select.innerHTML='<option value="">All Apartments</option>'

 const unique=[...new Set(allData.map(o=>o.apartment).filter(Boolean))]

 unique.forEach(a=>{
 select.innerHTML+=`<option value="${a}">${a}</option>`
 })

}

function render(){

 const table=document.getElementById("orders")
 table.innerHTML=""

 const mobile=document.getElementById("mobileOrders")
 mobile.innerHTML=""

 filteredData.forEach(o=>{

 table.innerHTML+=`
 <tr>
 <td>${o.phone}</td>
 <td>${o.address || ""}</td>
 <td>${o.quantity}</td>
 <td>${new Date(o.order_date).toLocaleDateString()}</td>
 </tr>
 `

 mobile.innerHTML+=`
 <div class="card-row">
 <div>${o.phone}</div>
 <div>${o.address}</div>
 <div>${o.quantity} packets</div>
 </div>
 `
 })

}

function filterData(){

 const phone=document.getElementById("phoneSearch").value
 const address=document.getElementById("addressSearch").value.toLowerCase()
 const apt=document.getElementById("apartmentFilter").value

 filteredData = allData.filter(o =>
 o.phone.includes(phone) &&
 (o.address || "").toLowerCase().includes(address) &&
 (!apt || o.apartment===apt)
 )

 render()

}

function sortTable(type){

 if(type==="quantity")
 filteredData.sort((a,b)=>a.quantity-b.quantity)

 if(type==="date")
 filteredData.sort((a,b)=>new Date(a.order_date)-new Date(b.order_date))

 render()

}

function generateOrders(){

 fetch(`/vendor/generate-orders?token=${token}`,{method:"POST"})
 .then(()=>loadOrders())

}

loadOrders()

</script>

</body>
</html>
